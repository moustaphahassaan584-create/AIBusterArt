<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>AIBuster – Class Diagram</title>
<style>
  body { background: #f0f4f8; font-family: 'Segoe UI', Arial, sans-serif; padding: 30px; }
  h2 { text-align: center; font-size: 20px; color: #1F3864; margin-bottom: 24px; }
</style>
</head>
<body>
<h2>AIBuster — Class Diagram</h2>
<svg width="1100" height="900" viewBox="0 0 1100 900" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="assoc" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 z" fill="#555"/>
    </marker>
    <marker id="inherit" markerWidth="10" markerHeight="10" refX="5" refY="5" orient="auto">
      <polygon points="0,0 10,5 0,10" fill="white" stroke="#1F3864" stroke-width="1.5"/>
    </marker>
    <marker id="compose" markerWidth="12" markerHeight="8" refX="0" refY="4" orient="auto">
      <polygon points="6,0 12,4 6,8 0,4" fill="#1F3864"/>
    </marker>
    <marker id="agg" markerWidth="12" markerHeight="8" refX="0" refY="4" orient="auto">
      <polygon points="6,0 12,4 6,8 0,4" fill="white" stroke="#1F3864" stroke-width="1.2"/>
    </marker>
  </defs>

  <!-- ─── CLASS BOX helper drawn inline ─── -->

  <!-- ══ ImageInput ══ -->
  <rect x="20" y="20" width="200" height="130" rx="6" fill="white" stroke="#1F3864" stroke-width="2"/>
  <rect x="20" y="20" width="200" height="30" rx="6" fill="#1F3864"/>
  <rect x="20" y="44" width="200" height="6" fill="#1F3864"/>
  <text x="120" y="41" text-anchor="middle" font-size="13" fill="white" font-weight="bold">ImageInput</text>
  <text x="30" y="68" font-size="11" fill="#333">- filePath: String</text>
  <text x="30" y="83" font-size="11" fill="#333">- format: String</text>
  <text x="30" y="98" font-size="11" fill="#333">- width: int</text>
  <text x="30" y="113" font-size="11" fill="#333">- height: int</text>
  <line x1="20" y1="120" x2="220" y2="120" stroke="#ccc" stroke-width="1"/>
  <text x="30" y="135" font-size="11" fill="#555">+ validate(): bool</text>

  <!-- ══ Preprocessor ══ -->
  <rect x="270" y="20" width="220" height="160" rx="6" fill="white" stroke="#60a8d0" stroke-width="2"/>
  <rect x="270" y="20" width="220" height="30" rx="6" fill="#60a8d0"/>
  <rect x="270" y="44" width="220" height="6" fill="#60a8d0"/>
  <text x="380" y="41" text-anchor="middle" font-size="13" fill="white" font-weight="bold">Preprocessor</text>
  <text x="280" y="68" font-size="11" fill="#333">- claheFactor: float = 1.5</text>
  <text x="280" y="83" font-size="11" fill="#333">- targetSize: int = 224</text>
  <line x1="270" y1="95" x2="490" y2="95" stroke="#ccc" stroke-width="1"/>
  <text x="280" y="111" font-size="11" fill="#555">+ stripExif(img): Image</text>
  <text x="280" y="126" font-size="11" fill="#555">+ applyClahe(img): Image</text>
  <text x="280" y="141" font-size="11" fill="#555">+ resize(img): Image</text>
  <text x="280" y="156" font-size="11" fill="#555">+ generateFormats(img): dict</text>

  <!-- ══ DetectionEngine (abstract) ══ -->
  <rect x="420" y="220" width="220" height="120" rx="6" fill="white" stroke="#888" stroke-width="2" stroke-dasharray="6,3"/>
  <rect x="420" y="220" width="220" height="30" rx="6" fill="#888"/>
  <rect x="420" y="244" width="220" height="6" fill="#888"/>
  <text x="530" y="238" text-anchor="middle" font-size="12" fill="white" font-style="italic">«abstract»</text>
  <text x="530" y="252" text-anchor="middle" font-size="13" fill="white" font-weight="bold">DetectionEngine</text>
  <text x="430" y="272" font-size="11" fill="#333">- name: String</text>
  <text x="430" y="287" font-size="11" fill="#333">- weight: float</text>
  <line x1="420" y1="295" x2="640" y2="295" stroke="#ccc" stroke-width="1"/>
  <text x="430" y="311" font-size="11" fill="#555" font-style="italic">+ analyze(img): float</text>
  <text x="430" y="326" font-size="11" fill="#555">+ getWeight(): float</text>

  <!-- ══ FFTEngine ══ -->
  <rect x="20" y="340" width="180" height="130" rx="6" fill="white" stroke="#40a070" stroke-width="2"/>
  <rect x="20" y="340" width="180" height="30" rx="6" fill="#40a070"/>
  <rect x="20" y="364" width="180" height="6" fill="#40a070"/>
  <text x="110" y="361" text-anchor="middle" font-size="13" fill="white" font-weight="bold">FFTEngine</text>
  <text x="30" y="385" font-size="11" fill="#333">- epsilon: float = 1e-8</text>
  <line x1="20" y1="393" x2="200" y2="393" stroke="#ccc" stroke-width="1"/>
  <text x="30" y="409" font-size="11" fill="#555">+ analyze(img): Image</text>
  <text x="30" y="424" font-size="11" fill="#555">+ computeSpectrum(gray)</text>
  <text x="30" y="439" font-size="11" fill="#555">+ detectGridPattern()</text>
  <text x="30" y="454" font-size="11" fill="#555">+ getVisualOutput(): Image</text>

  <!-- ══ ELAEngine ══ -->
  <rect x="220" y="340" width="180" height="130" rx="6" fill="white" stroke="#40a070" stroke-width="2"/>
  <rect x="220" y="340" width="180" height="30" rx="6" fill="#40a070"/>
  <rect x="220" y="364" width="180" height="6" fill="#40a070"/>
  <text x="310" y="361" text-anchor="middle" font-size="13" fill="white" font-weight="bold">ELAEngine</text>
  <text x="230" y="385" font-size="11" fill="#333">- jpegQuality: int = 90</text>
  <text x="230" y="400" font-size="11" fill="#333">- ampFactor: float = 15.0</text>
  <line x1="220" y1="408" x2="400" y2="408" stroke="#ccc" stroke-width="1"/>
  <text x="230" y="424" font-size="11" fill="#555">+ analyze(img): Image</text>
  <text x="230" y="439" font-size="11" fill="#555">+ recompress(img): Image</text>
  <text x="230" y="454" font-size="11" fill="#555">+ amplifyDiff(a, b): Image</text>

  <!-- ══ NoiseForensicEngine ══ -->
  <rect x="420" y="380" width="200" height="170" rx="6" fill="white" stroke="#40a070" stroke-width="2"/>
  <rect x="420" y="380" width="200" height="30" rx="6" fill="#40a070"/>
  <rect x="420" y="404" width="200" height="6" fill="#40a070"/>
  <text x="520" y="401" text-anchor="middle" font-size="12" fill="white" font-weight="bold">NoiseForensicEngine</text>
  <text x="430" y="424" font-size="11" fill="#333">- weights: float[4]</text>
  <text x="430" y="439" font-size="11" fill="#333">  [0.25,0.30,0.25,0.20]</text>
  <line x1="420" y1="447" x2="620" y2="447" stroke="#ccc" stroke-width="1"/>
  <text x="430" y="463" font-size="11" fill="#555">+ analyze(img): float</text>
  <text x="430" y="478" font-size="11" fill="#555">+ computeVariance(n): float</text>
  <text x="430" y="493" font-size="11" fill="#555">+ computeSpatialCorr(n): float</text>
  <text x="430" y="508" font-size="11" fill="#555">+ computeChannelCorr(n): float</text>
  <text x="430" y="523" font-size="11" fill="#555">+ computeEntropy(n): float</text>
  <text x="430" y="538" font-size="11" fill="#555">+ extractResidual(img): arr</text>

  <!-- ══ DLModelEngine ══ -->
  <rect x="650" y="340" width="210" height="170" rx="6" fill="white" stroke="#9060c0" stroke-width="2"/>
  <rect x="650" y="340" width="210" height="30" rx="6" fill="#9060c0"/>
  <rect x="650" y="364" width="210" height="6" fill="#9060c0"/>
  <text x="755" y="361" text-anchor="middle" font-size="13" fill="white" font-weight="bold">DLModelEngine</text>
  <text x="660" y="385" font-size="11" fill="#333">- modelId: String</text>
  <text x="660" y="400" font-size="11" fill="#333">- architecture: String</text>
  <text x="660" y="415" font-size="11" fill="#333">- ttaViews: int = 3</text>
  <line x1="650" y1="423" x2="860" y2="423" stroke="#ccc" stroke-width="1"/>
  <text x="660" y="439" font-size="11" fill="#555">+ analyze(img): float</text>
  <text x="660" y="454" font-size="11" fill="#555">+ runTTA(img): float[]</text>
  <text x="660" y="469" font-size="11" fill="#555">+ extractScore(result): float</text>
  <text x="660" y="484" font-size="11" fill="#555">+ loadPipeline(): void</text>
  <text x="660" y="499" font-size="11" fill="#555">+ flipImage(img): Image</text>

  <!-- ══ EnsembleAggregator ══ -->
  <rect x="650" y="560" width="210" height="160" rx="6" fill="white" stroke="#4a2080" stroke-width="2"/>
  <rect x="650" y="560" width="210" height="30" rx="6" fill="#4a2080"/>
  <rect x="650" y="584" width="210" height="6" fill="#4a2080"/>
  <text x="755" y="581" text-anchor="middle" font-size="13" fill="white" font-weight="bold">EnsembleAggregator</text>
  <text x="660" y="604" font-size="11" fill="#333">- threshold: float = 0.5</text>
  <text x="660" y="619" font-size="11" fill="#333">- engineWeights: Map</text>
  <line x1="650" y1="627" x2="860" y2="627" stroke="#ccc" stroke-width="1"/>
  <text x="660" y="643" font-size="11" fill="#555">+ aggregate(scores): float</text>
  <text x="660" y="658" font-size="11" fill="#555">+ computeWeightedAvg(): float</text>
  <text x="660" y="673" font-size="11" fill="#555">+ applyThreshold(s): String</text>
  <text x="660" y="688" font-size="11" fill="#555">+ getVerdict(): DetectionResult</text>
  <text x="660" y="703" font-size="11" fill="#555">+ adaptThreshold(scores): float</text>

  <!-- ══ DetectionResult ══ -->
  <rect x="20" y="570" width="200" height="130" rx="6" fill="white" stroke="#1F3864" stroke-width="2"/>
  <rect x="20" y="570" width="200" height="30" rx="6" fill="#1F3864"/>
  <rect x="20" y="594" width="200" height="6" fill="#1F3864"/>
  <text x="120" y="591" text-anchor="middle" font-size="13" fill="white" font-weight="bold">DetectionResult</text>
  <text x="30" y="614" font-size="11" fill="#333">- verdict: String</text>
  <text x="30" y="629" font-size="11" fill="#333">- confidence: float</text>
  <text x="30" y="644" font-size="11" fill="#333">- engineScores: Map</text>
  <text x="30" y="659" font-size="11" fill="#333">- fftMap: Image</text>
  <text x="30" y="674" font-size="11" fill="#333">- elaMap: Image</text>
  <line x1="20" y1="680" x2="220" y2="680" stroke="#ccc" stroke-width="1"/>
  <text x="30" y="696" font-size="11" fill="#555">+ toJSON(): String</text>

  <!-- ══ DetectionService ══ -->
  <rect x="270" y="570" width="200" height="150" rx="6" fill="white" stroke="#f09040" stroke-width="2"/>
  <rect x="270" y="570" width="200" height="30" rx="6" fill="#f09040"/>
  <rect x="270" y="594" width="200" height="6" fill="#f09040"/>
  <text x="370" y="591" text-anchor="middle" font-size="13" fill="white" font-weight="bold">DetectionService</text>
  <text x="280" y="614" font-size="11" fill="#333">- preprocessor: Preprocessor</text>
  <text x="280" y="629" font-size="11" fill="#333">- engines: List&lt;Engine&gt;</text>
  <text x="280" y="644" font-size="11" fill="#333">- aggregator: Ensemble</text>
  <line x1="270" y1="652" x2="470" y2="652" stroke="#ccc" stroke-width="1"/>
  <text x="280" y="668" font-size="11" fill="#555">+ detect(img): DetectionResult</text>
  <text x="280" y="683" font-size="11" fill="#555">+ runParallel(data): scores[]</text>
  <text x="280" y="698" font-size="11" fill="#555">+ buildResponse(r): JSON</text>
  <text x="280" y="713" font-size="11" fill="#555">+ handleError(e): Response</text>

  <!-- ═══ RELATIONSHIPS ═══ -->

  <!-- ImageInput → Preprocessor (uses) -->
  <line x1="220" y1="85" x2="268" y2="85" stroke="#555" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#assoc)"/>
  <text x="244" y="78" text-anchor="middle" font-size="10" fill="#555">«uses»</text>

  <!-- Preprocessor → DetectionEngine (feeds) -->
  <line x1="380" y1="180" x2="500" y2="218" stroke="#555" stroke-width="1.5" marker-end="url(#assoc)"/>
  <text x="430" y="195" font-size="10" fill="#555">feeds</text>

  <!-- FFTEngine inherits DetectionEngine -->
  <line x1="110" y1="340" x2="460" y2="342" stroke="#1F3864" stroke-width="1.5" marker-end="url(#inherit)"/>

  <!-- ELAEngine inherits -->
  <line x1="310" y1="340" x2="472" y2="340" stroke="#1F3864" stroke-width="1.5" marker-end="url(#inherit)"/>

  <!-- NoiseForensicEngine inherits -->
  <line x1="520" y1="380" x2="520" y2="342" stroke="#1F3864" stroke-width="1.5" marker-end="url(#inherit)"/>

  <!-- DLModelEngine inherits -->
  <line x1="700" y1="340" x2="610" y2="310" stroke="#1F3864" stroke-width="1.5" marker-end="url(#inherit)"/>

  <!-- DetectionService composes Engines -->
  <line x1="370" y1="570" x2="530" y2="510" stroke="#1F3864" stroke-width="1.5" marker-end="url(#compose)"/>
  <text x="440" y="540" font-size="10" fill="#333">1</text>
  <text x="530" y="505" font-size="10" fill="#333">*</text>

  <!-- DetectionService → EnsembleAggregator -->
  <line x1="470" y1="640" x2="648" y2="640" stroke="#555" stroke-width="1.5" marker-end="url(#assoc)"/>
  <text x="558" y="633" text-anchor="middle" font-size="10" fill="#555">uses</text>

  <!-- EnsembleAggregator → DetectionResult -->
  <line x1="650" y1="700" x2="222" y2="680" stroke="#555" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#assoc)"/>
  <text x="435" y="712" text-anchor="middle" font-size="10" fill="#555">«creates»</text>

  <!-- DetectionService → DetectionResult -->
  <line x1="270" y1="680" x2="222" y2="665" stroke="#555" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#assoc)"/>

  <!-- LEGEND -->
  <rect x="20" y="830" width="1060" height="60" rx="6" fill="white" stroke="#ccc" stroke-width="1"/>
  <text x="550" y="850" text-anchor="middle" font-size="12" font-weight="bold" fill="#1F3864">Legend</text>
  <line x1="40" y1="872" x2="80" y2="872" stroke="#1F3864" stroke-width="1.5" marker-end="url(#inherit)"/>
  <text x="90" y="876" font-size="11" fill="#333">Inheritance</text>
  <line x1="200" y1="872" x2="240" y2="872" stroke="#1F3864" stroke-width="1.5" marker-end="url(#compose)"/>
  <text x="250" y="876" font-size="11" fill="#333">Composition</text>
  <line x1="360" y1="872" x2="400" y2="872" stroke="#555" stroke-width="1.5" marker-end="url(#assoc)"/>
  <text x="410" y="876" font-size="11" fill="#333">Association</text>
  <line x1="500" y1="872" x2="540" y2="872" stroke="#555" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#assoc)"/>
  <text x="550" y="876" font-size="11" fill="#333">Dependency / «creates»</text>
  <rect x="730" y="862" width="14" height="14" rx="2" fill="#888"/><text x="750" y="874" font-size="11" fill="#333">Abstract Class</text>
  <rect x="870" y="862" width="14" height="14" rx="2" fill="#1F3864"/><text x="890" y="874" font-size="11" fill="#333">Concrete Class</text>
</svg>
</body>
