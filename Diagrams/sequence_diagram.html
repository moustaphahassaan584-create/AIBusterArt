<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>AIBuster – Sequence Diagram</title>
<style>
  body { background: #f0f4f8; font-family: 'Segoe UI', Arial, sans-serif; padding: 30px; }
  h2 { text-align: center; font-size: 20px; color: #1F3864; margin-bottom: 24px; }
</style>
</head>
<body>
<h2>AIBuster — Sequence Diagram: Image Detection Interaction</h2>
<svg width="980" height="900" viewBox="0 0 980 900" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="solid" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 z" fill="#1F3864"/>
    </marker>
    <marker id="dashed" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 z" fill="#888"/>
    </marker>
  </defs>

  <!-- Actor columns: x positions -->
  <!-- User:100  Frontend:230  Backend:390  Preprocessor:520  AIEngines:660  Ensemble:820 -->

  <!-- ACTOR BOXES -->
  <!-- User -->
  <rect x="40" y="20" width="120" height="44" rx="8" fill="#1F3864"/>
  <text x="100" y="47" text-anchor="middle" font-size="13" fill="white" font-weight="bold">User</text>

  <!-- Frontend/App -->
  <rect x="170" y="20" width="130" height="44" rx="8" fill="#4a72c4"/>
  <text x="235" y="38" text-anchor="middle" font-size="12" fill="white" font-weight="bold">Frontend</text>
  <text x="235" y="54" text-anchor="middle" font-size="10" fill="#cdd">(Gradio / Android)</text>

  <!-- Backend -->
  <rect x="320" y="20" width="140" height="44" rx="8" fill="#f09040"/>
  <text x="390" y="38" text-anchor="middle" font-size="12" fill="white" font-weight="bold">Backend</text>
  <text x="390" y="54" text-anchor="middle" font-size="10" fill="#fff">(FastAPI / ASP.NET)</text>

  <!-- Preprocessor -->
  <rect x="473" y="20" width="140" height="44" rx="8" fill="#60a8d0"/>
  <text x="543" y="38" text-anchor="middle" font-size="12" fill="white" font-weight="bold">Preprocessor</text>
  <text x="543" y="54" text-anchor="middle" font-size="10" fill="#eee">EXIF·CLAHE·Resize</text>

  <!-- AI Engines -->
  <rect x="626" y="20" width="140" height="44" rx="8" fill="#40a070"/>
  <text x="696" y="38" text-anchor="middle" font-size="12" fill="white" font-weight="bold">AI Engines</text>
  <text x="696" y="54" text-anchor="middle" font-size="10" fill="#eee">ViT · FFT · ELA · Noise</text>

  <!-- Ensemble -->
  <rect x="780" y="20" width="150" height="44" rx="8" fill="#7050a8"/>
  <text x="855" y="38" text-anchor="middle" font-size="12" fill="white" font-weight="bold">Ensemble</text>
  <text x="855" y="54" text-anchor="middle" font-size="10" fill="#ddd">Aggregator</text>

  <!-- LIFELINES -->
  <line x1="100" y1="64" x2="100" y2="860" stroke="#1F3864" stroke-width="1" stroke-dasharray="5,4"/>
  <line x1="235" y1="64" x2="235" y2="860" stroke="#4a72c4" stroke-width="1" stroke-dasharray="5,4"/>
  <line x1="390" y1="64" x2="390" y2="860" stroke="#f09040" stroke-width="1" stroke-dasharray="5,4"/>
  <line x1="543" y1="64" x2="543" y2="860" stroke="#60a8d0" stroke-width="1" stroke-dasharray="5,4"/>
  <line x1="696" y1="64" x2="696" y2="860" stroke="#40a070" stroke-width="1" stroke-dasharray="5,4"/>
  <line x1="855" y1="64" x2="855" y2="860" stroke="#7050a8" stroke-width="1" stroke-dasharray="5,4"/>

  <!-- ACTIVATION BARS -->
  <rect x="96"  y="90"  width="8" height="700" rx="2" fill="#1F3864" opacity="0.3"/>
  <rect x="231" y="100" width="8" height="680" rx="2" fill="#4a72c4" opacity="0.3"/>
  <rect x="386" y="120" width="8" height="640" rx="2" fill="#f09040" opacity="0.3"/>
  <rect x="539" y="150" width="8" height="240" rx="2" fill="#60a8d0" opacity="0.3"/>
  <rect x="692" y="210" width="8" height="340" rx="2" fill="#40a070" opacity="0.3"/>
  <rect x="851" y="560" width="8" height="140" rx="2" fill="#7050a8" opacity="0.3"/>

  <!-- ── MESSAGES ── -->
  <!-- Helper: solid arrow -->
  <!-- 1. User uploads image -->
  <line x1="104" y1="100" x2="229" y2="100" stroke="#1F3864" stroke-width="1.8" marker-end="url(#solid)"/>
  <text x="167" y="95" text-anchor="middle" font-size="11" fill="#1F3864">uploadImage(file)</text>

  <!-- 2. Frontend sends to backend -->
  <line x1="239" y1="125" x2="384" y2="125" stroke="#1F3864" stroke-width="1.8" marker-end="url(#solid)"/>
  <text x="311" y="120" text-anchor="middle" font-size="11" fill="#1F3864">POST /analyze (image bytes)</text>

  <!-- 3. Backend calls preprocessor -->
  <line x1="394" y1="152" x2="537" y2="152" stroke="#1F3864" stroke-width="1.8" marker-end="url(#solid)"/>
  <text x="465" y="147" text-anchor="middle" font-size="11" fill="#1F3864">preprocess(image)</text>

  <!-- 4. Preprocessor: strip EXIF -->
  <rect x="435" y="162" width="215" height="22" rx="4" fill="#ddeeff" stroke="#60a8d0" stroke-width="1"/>
  <text x="543" y="177" text-anchor="middle" font-size="10" fill="#1F3864">strip EXIF metadata</text>

  <!-- 5. Apply CLAHE -->
  <rect x="435" y="190" width="215" height="22" rx="4" fill="#ddeeff" stroke="#60a8d0" stroke-width="1"/>
  <text x="543" y="205" text-anchor="middle" font-size="10" fill="#1F3864">apply CLAHE enhancement</text>

  <!-- 6. Resize 224x224 -->
  <rect x="435" y="218" width="215" height="22" rx="4" fill="#ddeeff" stroke="#60a8d0" stroke-width="1"/>
  <text x="543" y="233" text-anchor="middle" font-size="10" fill="#1F3864">resize to 224×224, generate formats</text>

  <!-- 7. Return processed data -->
  <line x1="537" y1="252" x2="394" y2="252" stroke="#888" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#dashed)"/>
  <text x="465" y="247" text-anchor="middle" font-size="11" fill="#555">preprocessed data</text>

  <!-- 8. Backend calls AI Engines (parallel note) -->
  <line x1="394" y1="278" x2="690" y2="278" stroke="#1F3864" stroke-width="1.8" marker-end="url(#solid)"/>
  <text x="542" y="273" text-anchor="middle" font-size="11" fill="#1F3864">runParallelAnalysis(data)</text>

  <!-- LOOP/PAR box -->
  <rect x="420" y="288" width="285" height="22" rx="4" fill="#fff8cc" stroke="#c0a000" stroke-width="1"/>
  <text x="563" y="303" text-anchor="middle" font-size="10" fill="#806000">par [ FFT Analysis ]</text>

  <!-- 9. FFT -->
  <rect x="632" y="316" width="128" height="22" rx="4" fill="#c8ecd8" stroke="#40a070" stroke-width="1"/>
  <text x="696" y="331" text-anchor="middle" font-size="10" fill="#1a5c35">compute 2D FFT spectrum</text>

  <!-- 10. ELA -->
  <rect x="632" y="346" width="128" height="22" rx="4" fill="#c8ecd8" stroke="#40a070" stroke-width="1"/>
  <text x="696" y="361" text-anchor="middle" font-size="10" fill="#1a5c35">run ELA (JPEG diff ×15)</text>

  <!-- 11. Noise -->
  <rect x="632" y="376" width="128" height="22" rx="4" fill="#c8ecd8" stroke="#40a070" stroke-width="1"/>
  <text x="696" y="391" text-anchor="middle" font-size="10" fill="#1a5c35">extract noise residual</text>

  <!-- 12. Compute noise features -->
  <rect x="632" y="406" width="128" height="22" rx="4" fill="#c8ecd8" stroke="#40a070" stroke-width="1"/>
  <text x="696" y="421" text-anchor="middle" font-size="10" fill="#1a5c35">compute var·corr·entropy·chan</text>

  <!-- 13. ViT inference + TTA -->
  <rect x="632" y="436" width="128" height="22" rx="4" fill="#c8ecd8" stroke="#40a070" stroke-width="1"/>
  <text x="696" y="451" text-anchor="middle" font-size="10" fill="#1a5c35">ViT forward pass (×3 TTA)</text>

  <!-- 14. SigLIP + SMOGY -->
  <rect x="632" y="466" width="128" height="22" rx="4" fill="#c8ecd8" stroke="#40a070" stroke-width="1"/>
  <text x="696" y="481" text-anchor="middle" font-size="10" fill="#1a5c35">SigLIP · SMOGY inference</text>

  <!-- 15. Return all scores to backend -->
  <line x1="690" y1="500" x2="394" y2="500" stroke="#888" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#dashed)"/>
  <text x="542" y="495" text-anchor="middle" font-size="11" fill="#555">scores[ ] + visual maps</text>

  <!-- 16. Backend calls ensemble -->
  <line x1="394" y1="526" x2="849" y2="526" stroke="#1F3864" stroke-width="1.8" marker-end="url(#solid)"/>
  <text x="620" y="521" text-anchor="middle" font-size="11" fill="#1F3864">aggregate(scores[], noiseScore)</text>

  <!-- Ensemble internals -->
  <rect x="785" y="538" width="140" height="22" rx="4" fill="#e8d0f8" stroke="#7050a8" stroke-width="1"/>
  <text x="855" y="553" text-anchor="middle" font-size="10" fill="#5a1a7a">compute weighted sum</text>

  <rect x="785" y="566" width="140" height="22" rx="4" fill="#e8d0f8" stroke="#7050a8" stroke-width="1"/>
  <text x="855" y="581" text-anchor="middle" font-size="10" fill="#5a1a7a">apply threshold (0.5)</text>

  <rect x="785" y="594" width="140" height="22" rx="4" fill="#e8d0f8" stroke="#7050a8" stroke-width="1"/>
  <text x="855" y="609" text-anchor="middle" font-size="10" fill="#5a1a7a">determine verdict: FAKE/REAL</text>

  <!-- 17. Return verdict to backend -->
  <line x1="849" y1="628" x2="394" y2="628" stroke="#888" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#dashed)"/>
  <text x="620" y="623" text-anchor="middle" font-size="11" fill="#555">verdict + confidence + evidence</text>

  <!-- 18. Backend returns to frontend -->
  <line x1="386" y1="660" x2="239" y2="660" stroke="#888" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#dashed)"/>
  <text x="311" y="655" text-anchor="middle" font-size="11" fill="#555">JSON { verdict, confidence, scores }</text>

  <!-- 19. Frontend displays to user -->
  <line x1="231" y1="690" x2="104" y2="690" stroke="#888" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#dashed)"/>
  <text x="167" y="685" text-anchor="middle" font-size="11" fill="#555">display result + visuals</text>

  <!-- END NOTE -->
  <rect x="30" y="718" width="920" height="36" rx="6" fill="#fffde0" stroke="#c0a000" stroke-width="1"/>
  <text x="490" y="735" text-anchor="middle" font-size="11" fill="#806000">Note: Steps 9–14 (FFT, ELA, Noise, ViT, SigLIP, SMOGY) execute in parallel via async pipeline</text>
  <text x="490" y="749" text-anchor="middle" font-size="11" fill="#806000">and results are collected before ensemble aggregation in step 16.</text>

  <!-- LEGEND -->
  <rect x="30" y="770" width="920" height="70" rx="8" fill="white" stroke="#ccc" stroke-width="1"/>
  <text x="490" y="790" text-anchor="middle" font-size="12" font-weight="bold" fill="#1F3864">Legend</text>
  <line x1="50" y1="820" x2="120" y2="820" stroke="#1F3864" stroke-width="2" marker-end="url(#solid)"/>
  <text x="130" y="824" font-size="11" fill="#333">Synchronous call</text>
  <line x1="250" y1="820" x2="320" y2="820" stroke="#888" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#dashed)"/>
  <text x="330" y="824" font-size="11" fill="#333">Return / Response</text>
  <rect x="460" y="812" width="16" height="16" rx="3" fill="#ddeeff" stroke="#60a8d0" stroke-width="1"/>
  <text x="484" y="824" font-size="11" fill="#333">Internal Process / Note</text>
  <rect x="650" y="812" width="16" height="16" rx="3" fill="#fff8cc" stroke="#c0a000" stroke-width="1"/>
  <text x="674" y="824" font-size="11" fill="#333">Loop / Parallel Frame</text>
</svg>
</body>
</html>
