<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>AIBuster – Use Case Diagram</title>
<style>
  body { background: #f0f4f8; font-family: 'Segoe UI', Arial, sans-serif; padding: 30px; }
  h2 { text-align: center; font-size: 20px; color: #1F3864; margin-bottom: 24px; }
</style>
</head>
<body>
<h2>AIBuster — Use Case Diagram</h2>
<svg width="1050" height="900" viewBox="0 0 1050 900" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="solid" markerWidth="9" markerHeight="7" refX="8" refY="3.5" orient="auto">
      <polygon points="0,0 9,3.5 0,7" fill="#334"/>
    </marker>
    <marker id="open" markerWidth="9" markerHeight="7" refX="8" refY="3.5" orient="auto">
      <polyline points="0,0 9,3.5 0,7" fill="none" stroke="#666" stroke-width="1.2"/>
    </marker>
  </defs>

  <!-- ══════════════════════════
       SYSTEM BOUNDARY
  ══════════════════════════ -->
  <rect x="195" y="30" width="660" height="840" rx="12"
        fill="#f8faff" stroke="#1F3864" stroke-width="2.5" stroke-dasharray="8,4"/>
  <text x="525" y="57" text-anchor="middle" font-size="16"
        font-weight="bold" fill="#1F3864">AIBuster Detection System</text>

  <!-- ══════════════════════════
       ACTOR: User (left)
  ══════════════════════════ -->
  <g id="actor-user">
    <circle cx="72" cy="195" r="20" fill="none" stroke="#1F3864" stroke-width="2"/>
    <line x1="72" y1="215" x2="72" y2="270" stroke="#1F3864" stroke-width="2"/>
    <line x1="38"  y1="240" x2="106" y2="240" stroke="#1F3864" stroke-width="2"/>
    <line x1="72"  y1="270" x2="38"  y2="305" stroke="#1F3864" stroke-width="2"/>
    <line x1="72"  y1="270" x2="106" y2="305" stroke="#1F3864" stroke-width="2"/>
    <text x="72" y="325" text-anchor="middle" font-size="13" font-weight="bold" fill="#1F3864">User</text>
    <text x="72" y="340" text-anchor="middle" font-size="10" fill="#666">«Main Actor»</text>
  </g>

  <!-- ACTOR: Developer (left lower) -->
  <g id="actor-dev">
    <circle cx="72" cy="620" r="20" fill="none" stroke="#1a5c35" stroke-width="2"/>
    <line x1="72" y1="640" x2="72"  y2="695" stroke="#1a5c35" stroke-width="2"/>
    <line x1="38" y1="665" x2="106" y2="665" stroke="#1a5c35" stroke-width="2"/>
    <line x1="72" y1="695" x2="38"  y2="730" stroke="#1a5c35" stroke-width="2"/>
    <line x1="72" y1="695" x2="106" y2="730" stroke="#1a5c35" stroke-width="2"/>
    <text x="72" y="750" text-anchor="middle" font-size="13" font-weight="bold" fill="#1a5c35">Developer</text>
    <text x="72" y="764" text-anchor="middle" font-size="10" fill="#666">«Admin»</text>
  </g>

  <!-- ACTOR: HuggingFace (right) -->
  <g id="actor-hf">
    <circle cx="978" cy="195" r="20" fill="none" stroke="#f09040" stroke-width="2"/>
    <line x1="978" y1="215" x2="978" y2="270" stroke="#f09040" stroke-width="2"/>
    <line x1="944" y1="240" x2="1012" y2="240" stroke="#f09040" stroke-width="2"/>
    <line x1="978" y1="270" x2="944"  y2="305" stroke="#f09040" stroke-width="2"/>
    <line x1="978" y1="270" x2="1012" y2="305" stroke="#f09040" stroke-width="2"/>
    <text x="978" y="325" text-anchor="middle" font-size="13" font-weight="bold" fill="#f09040">HuggingFace</text>
    <text x="978" y="340" text-anchor="middle" font-size="10" fill="#666">«External»</text>
  </g>

  <!-- ACTOR: Android App (right lower) -->
  <g id="actor-android">
    <circle cx="978" cy="600" r="20" fill="none" stroke="#7050a8" stroke-width="2"/>
    <line x1="978" y1="620" x2="978"  y2="675" stroke="#7050a8" stroke-width="2"/>
    <line x1="944" y1="645" x2="1012" y2="645" stroke="#7050a8" stroke-width="2"/>
    <line x1="978" y1="675" x2="944"  y2="710" stroke="#7050a8" stroke-width="2"/>
    <line x1="978" y1="675" x2="1012" y2="710" stroke="#7050a8" stroke-width="2"/>
    <text x="978" y="730" text-anchor="middle" font-size="13" font-weight="bold" fill="#7050a8">Android App</text>
    <text x="978" y="744" text-anchor="middle" font-size="10" fill="#666">«Mobile Client»</text>
  </g>

  <!-- ══════════════════════════
       USE CASES
       Left column (user-facing): x=360
       Right column (system):     x=680
  ══════════════════════════ -->

  <!-- ── LEFT COLUMN ── -->
  <!-- UC1: Upload Image -->
  <ellipse cx="355" cy="120" rx="135" ry="26" fill="#dce8fb" stroke="#1F3864" stroke-width="1.8"/>
  <text x="355" y="125" text-anchor="middle" font-size="12.5" fill="#1F3864">Upload Image</text>

  <!-- UC2: View Verdict (REAL/FAKE) -->
  <ellipse cx="355" cy="195" rx="135" ry="26" fill="#dce8fb" stroke="#1F3864" stroke-width="1.8"/>
  <text x="355" y="200" text-anchor="middle" font-size="12.5" fill="#1F3864">View Verdict (REAL / FAKE)</text>

  <!-- UC3: View Confidence Score -->
  <ellipse cx="355" cy="270" rx="135" ry="26" fill="#dce8fb" stroke="#1F3864" stroke-width="1.8"/>
  <text x="355" y="275" text-anchor="middle" font-size="12.5" fill="#1F3864">View Confidence Score</text>

  <!-- UC4: View Forensic Visuals -->
  <ellipse cx="355" cy="348" rx="135" ry="26" fill="#dce8fb" stroke="#1F3864" stroke-width="1.8"/>
  <text x="355" y="343" text-anchor="middle" font-size="12" fill="#1F3864">View Forensic Visuals</text>
  <text x="355" y="358" text-anchor="middle" font-size="10" fill="#555">(FFT · ELA · Noise map)</text>

  <!-- UC5: Use Web Interface (Gradio) -->
  <ellipse cx="355" cy="430" rx="135" ry="26" fill="#dce8fb" stroke="#1F3864" stroke-width="1.8"/>
  <text x="355" y="435" text-anchor="middle" font-size="12.5" fill="#1F3864">Use Web Interface (Gradio)</text>

  <!-- UC6: Use REST API -->
  <ellipse cx="355" cy="510" rx="135" ry="26" fill="#dce8fb" stroke="#1F3864" stroke-width="1.8"/>
  <text x="355" y="515" text-anchor="middle" font-size="12.5" fill="#1F3864">Use REST API  /analyze</text>

  <!-- UC_DEV1: Train & Fine-tune Model -->
  <ellipse cx="355" cy="610" rx="135" ry="26" fill="#d4f0e0" stroke="#1a5c35" stroke-width="1.8"/>
  <text x="355" y="615" text-anchor="middle" font-size="12.5" fill="#1a5c35">Train &amp; Fine-tune Model</text>

  <!-- UC_DEV2: Deploy to HF Spaces -->
  <ellipse cx="355" cy="685" rx="135" ry="26" fill="#d4f0e0" stroke="#1a5c35" stroke-width="1.8"/>
  <text x="355" y="690" text-anchor="middle" font-size="12.5" fill="#1a5c35">Deploy to HF Spaces</text>

  <!-- UC_DEV3: Push Model Weights -->
  <ellipse cx="355" cy="760" rx="135" ry="26" fill="#d4f0e0" stroke="#1a5c35" stroke-width="1.8"/>
  <text x="355" y="765" text-anchor="middle" font-size="12.5" fill="#1a5c35">Push Model Weights to Hub</text>

  <!-- ── RIGHT COLUMN (internal system processes) ── -->
  <!-- UC7: Preprocess Image -->
  <ellipse cx="695" cy="120" rx="140" ry="26" fill="#fff3e8" stroke="#f09040" stroke-width="1.8"/>
  <text x="695" y="115" text-anchor="middle" font-size="12" fill="#8B4500">Preprocess Image</text>
  <text x="695" y="130" text-anchor="middle" font-size="10" fill="#888">(EXIF strip · CLAHE · resize)</text>

  <!-- UC8: Run FFT Analysis -->
  <ellipse cx="695" cy="210" rx="140" ry="26" fill="#eef8f2" stroke="#40a070" stroke-width="1.8"/>
  <text x="695" y="215" text-anchor="middle" font-size="12.5" fill="#1a5c35">Run FFT Analysis</text>

  <!-- UC9: Run ELA Analysis -->
  <ellipse cx="695" cy="290" rx="140" ry="26" fill="#eef8f2" stroke="#40a070" stroke-width="1.8"/>
  <text x="695" y="295" text-anchor="middle" font-size="12.5" fill="#1a5c35">Run ELA Analysis</text>

  <!-- UC10: Run Noise Forensics -->
  <ellipse cx="695" cy="370" rx="140" ry="26" fill="#eef8f2" stroke="#40a070" stroke-width="1.8"/>
  <text x="695" y="375" text-anchor="middle" font-size="12.5" fill="#1a5c35">Run Noise Forensics</text>

  <!-- UC11: Run DL Classification (ViT+TTA) -->
  <ellipse cx="695" cy="455" rx="140" ry="26" fill="#f0eafc" stroke="#9060c0" stroke-width="1.8"/>
  <text x="695" y="450" text-anchor="middle" font-size="12" fill="#5a1a7a">Run DL Classification</text>
  <text x="695" y="465" text-anchor="middle" font-size="10" fill="#888">(ViT · SigLIP · SMOGY + TTA)</text>

  <!-- UC12: Ensemble Aggregation -->
  <ellipse cx="695" cy="550" rx="140" ry="26" fill="#e8d0f8" stroke="#4a2080" stroke-width="2"/>
  <text x="695" y="555" text-anchor="middle" font-size="12.5" fill="#4a2080" font-weight="bold">Ensemble Aggregation</text>

  <!-- UC13: Generate &amp; Return Verdict -->
  <ellipse cx="695" cy="635" rx="140" ry="26" fill="#e8d0f8" stroke="#4a2080" stroke-width="2"/>
  <text x="695" y="640" text-anchor="middle" font-size="12.5" fill="#4a2080" font-weight="bold">Generate &amp; Return Verdict</text>

  <!-- UC14: Load Model Weights (HF) -->
  <ellipse cx="695" cy="730" rx="140" ry="26" fill="#fff3e8" stroke="#f09040" stroke-width="1.8"/>
  <text x="695" y="735" text-anchor="middle" font-size="12.5" fill="#8B4500">Load Model Weights</text>

  <!-- UC15: Serve Inference (HF) -->
  <ellipse cx="695" cy="815" rx="140" ry="26" fill="#fff3e8" stroke="#f09040" stroke-width="1.8"/>
  <text x="695" y="820" text-anchor="middle" font-size="12.5" fill="#8B4500">Serve Inference Endpoint</text>

  <!-- ══════════════════════════
       ACTOR → USE CASE ASSOCIATIONS
  ══════════════════════════ -->

  <!-- User → UC1..UC6 -->
  <line x1="140" y1="210" x2="220" y2="125" stroke="#1F3864" stroke-width="1.4"/>
  <line x1="140" y1="220" x2="220" y2="197" stroke="#1F3864" stroke-width="1.4"/>
  <line x1="140" y1="228" x2="220" y2="272" stroke="#1F3864" stroke-width="1.4"/>
  <line x1="140" y1="235" x2="220" y2="350" stroke="#1F3864" stroke-width="1.4"/>
  <line x1="140" y1="240" x2="220" y2="432" stroke="#1F3864" stroke-width="1.4"/>
  <line x1="140" y1="245" x2="220" y2="512" stroke="#1F3864" stroke-width="1.4"/>

  <!-- Developer → UC_DEV1..3 -->
  <line x1="140" y1="630" x2="220" y2="613" stroke="#1a5c35" stroke-width="1.4"/>
  <line x1="140" y1="640" x2="220" y2="687" stroke="#1a5c35" stroke-width="1.4"/>
  <line x1="140" y1="650" x2="220" y2="762" stroke="#1a5c35" stroke-width="1.4"/>

  <!-- HuggingFace → UC14, UC15 -->
  <line x1="838" y1="210" x2="836" y2="732" stroke="#f09040" stroke-width="1.4"/>
  <line x1="838" y1="220" x2="836" y2="817" stroke="#f09040" stroke-width="1.4"/>

  <!-- Android → UC6, UC13 -->
  <line x1="840" y1="610" x2="836" y2="635" stroke="#7050a8" stroke-width="1.4"/>
  <line x1="840" y1="620" x2="491" y2="513" stroke="#7050a8" stroke-width="1.4"/>

  <!-- ══════════════════════════
       «include» RELATIONSHIPS
       dashed arrow from base UC to included UC
  ══════════════════════════ -->

  <!-- UC1 Upload ──include──► UC7 Preprocess -->
  <line x1="491" y1="120" x2="554" y2="120"
        stroke="#666" stroke-width="1.3" stroke-dasharray="5,3" marker-end="url(#open)"/>
  <text x="522" y="114" text-anchor="middle" font-size="9.5" fill="#666">«include»</text>

  <!-- UC7 Preprocess ──include──► UC8 FFT -->
  <line x1="695" y1="147" x2="695" y2="183"
        stroke="#666" stroke-width="1.3" stroke-dasharray="5,3" marker-end="url(#open)"/>
  <text x="705" y="168" font-size="9.5" fill="#666">«include»</text>

  <!-- UC7 Preprocess ──include──► UC9 ELA (extend line right then down) -->
  <polyline points="720,147 740,147 740,264 836,264"
        fill="none" stroke="#666" stroke-width="1.3" stroke-dasharray="5,3" marker-end="url(#open)"/>
  <text x="760" y="215" font-size="9.5" fill="#666">«include»</text>

  <!-- UC7 Preprocess ──include──► UC10 Noise -->
  <polyline points="730,148 760,148 760,344 836,344 836,370 555,370"
        fill="none" stroke="#666" stroke-width="1.3" stroke-dasharray="5,3" marker-end="url(#open)"/>
  <text x="762" y="300" font-size="9.5" fill="#666">«include»</text>

  <!-- UC7 Preprocess ──include──► UC11 DL Classification -->
  <polyline points="735,149 770,149 770,455 836,455 836,455 555,455 555,455"
        fill="none" stroke="#666" stroke-width="1.3" stroke-dasharray="5,3" marker-end="url(#open)"/>
  <text x="773" y="380" font-size="9.5" fill="#666">«include»</text>

  <!-- UC8,9,10,11 ──include──► UC12 Ensemble -->
  <line x1="695" y1="237" x2="695" y2="523"
        stroke="#666" stroke-width="1.3" stroke-dasharray="5,3" marker-end="url(#open)"/>
  <text x="706" y="385" font-size="9.5" fill="#666">«include»</text>

  <!-- UC12 Ensemble ──include──► UC13 Verdict -->
  <line x1="695" y1="577" x2="695" y2="608"
        stroke="#666" stroke-width="1.3" stroke-dasharray="5,3" marker-end="url(#open)"/>
  <text x="706" y="596" font-size="9.5" fill="#666">«include»</text>

  <!-- UC14 Load Weights ──include──► UC11 DL (HF provides weights) -->
  <line x1="695" y1="703" x2="695" y2="482"
        stroke="#f09040" stroke-width="1.3" stroke-dasharray="5,3" marker-end="url(#open)"/>
  <text x="706" y="595" font-size="9.5" fill="#f09040"></text>

  <!-- UC2 View Verdict ──include──► UC13 Generate Verdict -->
  <line x1="491" y1="197" x2="555" y2="637"
        stroke="#666" stroke-width="1.2" stroke-dasharray="5,3" marker-end="url(#open)"/>
  <text x="540" y="420" font-size="9.5" fill="#666" transform="rotate(-73 540 420)">«include»</text>

  <!-- UC3 View Score ──extend──► UC13 Generate Verdict -->
  <line x1="491" y1="272" x2="555" y2="638"
        stroke="#888" stroke-width="1.2" stroke-dasharray="4,4" marker-end="url(#open)"/>
  <text x="538" y="455" font-size="9.5" fill="#888" transform="rotate(-60 538 455)">«extend»</text>

  <!-- UC4 Forensic Visuals ──extend──► UC8 FFT -->
  <line x1="491" y1="340" x2="554" y2="215"
        stroke="#888" stroke-width="1.2" stroke-dasharray="4,4" marker-end="url(#open)"/>
  <text x="538" y="270" font-size="9.5" fill="#888" transform="rotate(28 538 270)">«extend»</text>

  <!-- UC5 Web Interface ──include──► UC1 Upload -->
  <line x1="355" y1="403" x2="355" y2="147"
        stroke="#666" stroke-width="1.2" stroke-dasharray="5,3" marker-end="url(#open)"/>
  <text x="362" y="280" font-size="9.5" fill="#666">«include»</text>

  <!-- UC6 REST API ──include──► UC1 Upload (also entry point) -->
  <polyline points="220,510 200,510 200,120 220,120"
        fill="none" stroke="#666" stroke-width="1.2" stroke-dasharray="5,3" marker-end="url(#open)"/>
  <text x="168" y="316" font-size="9.5" fill="#666" transform="rotate(-90 168 316)">«include»</text>

  <!-- ══════════════════════════
       LEGEND
  ══════════════════════════ -->
  <rect x="200" y="856" width="656" height="36" rx="6"
        fill="white" stroke="#ccc" stroke-width="1"/>
  <line x1="220" y1="874" x2="260" y2="874" stroke="#334" stroke-width="1.5" marker-end="url(#solid)"/>
  <text x="268" y="878" font-size="11" fill="#333">Association</text>

  <line x1="360" y1="874" x2="400" y2="874" stroke="#666" stroke-width="1.3"
        stroke-dasharray="5,3" marker-end="url(#open)"/>
  <text x="408" y="878" font-size="11" fill="#333">«include»</text>

  <line x1="500" y1="874" x2="540" y2="874" stroke="#888" stroke-width="1.2"
        stroke-dasharray="4,4" marker-end="url(#open)"/>
  <text x="548" y="878" font-size="11" fill="#333">«extend»</text>

  <ellipse cx="660" cy="874" rx="36" ry="12" fill="#dce8fb" stroke="#1F3864" stroke-width="1.5"/>
  <text x="660" y="878" text-anchor="middle" font-size="10" fill="#1F3864">Use Case</text>

  <circle cx="790" cy="874" r="10" fill="none" stroke="#333" stroke-width="1.5"/>
  <line x1="790" y1="884" x2="790" y2="895" stroke="#333" stroke-width="1.5"/>
  <line x1="775" y1="889" x2="805" y2="889" stroke="#333" stroke-width="1.5"/>
  <text x="808" y="878" font-size="11" fill="#333">Actor</text>
</svg>
</body>
</html>
